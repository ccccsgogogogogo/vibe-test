<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凑企鹅 Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">🐧 凑企鹅</h1>
            </div>
            <div class="conversation-list">
                <button class="new-chat-btn">
                    <span class="icon">+</span>
                    新对话
                </button>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name">用户</div>
                        <div class="user-model">凑企鹅 v1.0</div>
                    </div>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <div class="chat-container" id="chatContainer">
                <div class="welcome-message" id="welcomeMsg">
                    <div class="welcome-icon">🐧</div>
                    <h2>你好，我是凑企鹅</h2>
                    <p>无论你说什么，我都只会回复一句话。试试看吧！</p>
                    <div class="quick-actions">
                        <button class="quick-btn">你好</button>
                        <button class="quick-btn">今天天气怎么样</button>
                        <button class="quick-btn">讲个笑话</button>
                    </div>
                </div>
                <div class="message-list" id="messageList"></div>
            </div>
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="输入你的消息..." rows="1"></textarea>
                    <div class="input-actions">
                        <button class="send-btn" id="sendBtn">
                            <span>发送</span>
                            <span class="send-icon">→</span>
                        </button>
                    </div>
                </div>
                <div class="input-footer">
                    <span>凑企鹅 v1.0</span>
                    <span class="divider">|</span>
                    <span>永远只说一句话</span>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
